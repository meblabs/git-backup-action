name: Quality

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload SARIF to code scanning
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      # zizmorcore/* is not in the allowlist -> hash-pinned.
      # version pins the zizmor CLI to the org-standard version.
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          version: v1.25.2

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Run shellcheck
        shell: bash
        run: |
          set -euo pipefail
          # Pre-installed on ubuntu-latest runners.
          shellcheck setup.sh

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # gitleaks CLI is MIT and free; the gitleaks-action requires an org
      # license, so we pin + checksum-verify the binary instead.
      GITLEAKS_VERSION: "8.30.1"
      GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0          # full history so gitleaks can scan every commit
          persist-credentials: false

      - name: Install gitleaks (pinned + checksum-verified)
        shell: bash
        run: |
          set -euo pipefail
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${tarball}" \
            -o "${tarball}"
          echo "${GITLEAKS_SHA256}  ${tarball}" | sha256sum -c -
          tar -xzf "${tarball}" gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks
        shell: bash
        run: |
          set -euo pipefail
          # Scan the full git history; exits non-zero (fails the job) on any finding.
          gitleaks git . --redact --verbose
